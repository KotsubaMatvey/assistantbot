services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricebot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pricebot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/pricebot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENV: ${ENV:-local}
      CITY: ${CITY:-Бор}
      PRICE_FRESHNESS_HOURS: ${PRICE_FRESHNESS_HOURS:-24}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-12}
      ENABLE_PLAYWRIGHT: ${ENABLE_PLAYWRIGHT:-false}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-/app/assistantbotmemory}
      ASSISTANT_ACCESS_MODE: ${ASSISTANT_ACCESS_MODE:-pairing}
      ASSISTANT_APPROVAL_TTL_MINUTES: ${ASSISTANT_APPROVAL_TTL_MINUTES:-30}
      ASSISTANT_PAIRING_TTL_MINUTES: ${ASSISTANT_PAIRING_TTL_MINUTES:-15}
      ASSISTANT_CONTEXT_VISIBILITY: ${ASSISTANT_CONTEXT_VISIBILITY:-allowlist}
      ASSISTANT_GROUP_TRIGGER_POLICY: ${ASSISTANT_GROUP_TRIGGER_POLICY:-mention}
      ASSISTANT_DEFAULT_MODE: ${ASSISTANT_DEFAULT_MODE:-secretary}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_CLOUD_CONTEXT_ALLOWED: ${LLM_CLOUD_CONTEXT_ALLOWED:-false}
      LLM_CONTEXT_MODE: ${LLM_CONTEXT_MODE:-snippets}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_CONTEXT_NOTES: ${LLM_MAX_CONTEXT_NOTES:-5}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-700}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_DAILY_LIMIT_COOLDOWN_HOURS: ${LLM_DAILY_LIMIT_COOLDOWN_HOURS:-24}
      LLM_PROVIDER_ORDER: ${LLM_PROVIDER_ORDER:-groq,cerebras,openrouter,mistral,github_models,zai,nvidia,llm7,ovh,siliconflow}
      LLM_PROVIDER_SPECS_JSON: ${LLM_PROVIDER_SPECS_JSON:-}
      LLM_GROQ_API_KEY: ${LLM_GROQ_API_KEY:-}
      LLM_GROQ_MODEL: ${LLM_GROQ_MODEL:-llama-3.1-8b-instant}
      LLM_CEREBRAS_API_KEY: ${LLM_CEREBRAS_API_KEY:-}
      LLM_CEREBRAS_MODEL: ${LLM_CEREBRAS_MODEL:-llama3.1-8b}
      LLM_OPENROUTER_API_KEY: ${LLM_OPENROUTER_API_KEY:-}
      LLM_OPENROUTER_MODEL: ${LLM_OPENROUTER_MODEL:-openrouter/free}
      LLM_OPENROUTER_SITE_URL: ${LLM_OPENROUTER_SITE_URL:-}
      LLM_OPENROUTER_APP_NAME: ${LLM_OPENROUTER_APP_NAME:-Assistant Bot}
      LLM_MISTRAL_API_KEY: ${LLM_MISTRAL_API_KEY:-}
      LLM_MISTRAL_MODEL: ${LLM_MISTRAL_MODEL:-mistral-small-latest}
      LLM_GITHUB_MODELS_TOKEN: ${LLM_GITHUB_MODELS_TOKEN:-}
      LLM_GITHUB_MODELS_MODEL: ${LLM_GITHUB_MODELS_MODEL:-openai/gpt-4.1-mini}
      LLM_ZAI_API_KEY: ${LLM_ZAI_API_KEY:-}
      LLM_ZAI_MODEL: ${LLM_ZAI_MODEL:-glm-4.5-flash}
      LLM_NVIDIA_API_KEY: ${LLM_NVIDIA_API_KEY:-}
      LLM_NVIDIA_MODEL: ${LLM_NVIDIA_MODEL:-nvidia/nemotron-3-nano-30b-a3b}
      LLM_LLM7_API_KEY: ${LLM_LLM7_API_KEY:-}
      LLM_LLM7_MODEL: ${LLM_LLM7_MODEL:-mistral-small-3.1-24b}
      LLM_OVH_API_KEY: ${LLM_OVH_API_KEY:-}
      LLM_OVH_MODEL: ${LLM_OVH_MODEL:-Meta-Llama-3_1-8B-Instruct}
      LLM_SILICONFLOW_API_KEY: ${LLM_SILICONFLOW_API_KEY:-}
      LLM_SILICONFLOW_MODEL: ${LLM_SILICONFLOW_MODEL:-Qwen/Qwen3-8B}
      TG_MINI_APP_URL: ${TG_MINI_APP_URL:-}
      MINI_APP_API_ENABLED: ${MINI_APP_API_ENABLED:-true}
      MINI_APP_API_HOST: ${MINI_APP_API_HOST:-0.0.0.0}
      MINI_APP_API_PORT: ${MINI_APP_API_PORT:-8080}
      MINI_APP_STATIC_DIR: ${MINI_APP_STATIC_DIR:-miniapp/dist}
      BOT_ENABLED_FEATURES: ${BOT_ENABLED_FEATURES:-all}
      BOT_DISABLED_FEATURES: ${BOT_DISABLED_FEATURES:-}
      LIVE_PRICE_REFRESH_ENABLED: ${LIVE_PRICE_REFRESH_ENABLED:-false}
      LIVE_PRICE_REFRESH_LIMIT_PER_QUERY: ${LIVE_PRICE_REFRESH_LIMIT_PER_QUERY:-10}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-[]}
      MAGNIT_SHOP_CODE: ${MAGNIT_SHOP_CODE:-}
      MAGNIT_SHOP_TYPE: ${MAGNIT_SHOP_TYPE:-}
      PYATEROCHKA_STORE_ID: ${PYATEROCHKA_STORE_ID:-}
      PYATEROCHKA_CITY_ID: ${PYATEROCHKA_CITY_ID:-}
      SPAR_REGION: ${SPAR_REGION:-}
      SMART_STORE_ID: ${SMART_STORE_ID:-}
      FIX_PRICE_CITY: ${FIX_PRICE_CITY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./assistantbotmemory:/app/assistantbotmemory
      - ./miniapp/dist:/app/miniapp/dist:ro
    ports:
      - "${MINI_APP_API_PORT:-8080}:8080"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed_stores &&
             python -m app.main"

volumes:
  postgres_data:
