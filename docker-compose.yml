services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricebot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pricebot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/pricebot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENV: ${ENV:-local}
      CITY: ${CITY:-Бор}
      PRICE_FRESHNESS_HOURS: ${PRICE_FRESHNESS_HOURS:-24}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-12}
      ENABLE_PLAYWRIGHT: ${ENABLE_PLAYWRIGHT:-false}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-/app/assistantbotmemory}
      ASSISTANT_ACCESS_MODE: ${ASSISTANT_ACCESS_MODE:-pairing}
      ASSISTANT_APPROVAL_TTL_MINUTES: ${ASSISTANT_APPROVAL_TTL_MINUTES:-30}
      ASSISTANT_PAIRING_TTL_MINUTES: ${ASSISTANT_PAIRING_TTL_MINUTES:-15}
      ASSISTANT_CONTEXT_VISIBILITY: ${ASSISTANT_CONTEXT_VISIBILITY:-allowlist}
      ASSISTANT_GROUP_TRIGGER_POLICY: ${ASSISTANT_GROUP_TRIGGER_POLICY:-mention}
      ASSISTANT_DEFAULT_MODE: ${ASSISTANT_DEFAULT_MODE:-secretary}
      TG_MINI_APP_URL: ${TG_MINI_APP_URL:-}
      BOT_ENABLED_FEATURES: ${BOT_ENABLED_FEATURES:-all}
      BOT_DISABLED_FEATURES: ${BOT_DISABLED_FEATURES:-}
      LIVE_PRICE_REFRESH_ENABLED: ${LIVE_PRICE_REFRESH_ENABLED:-false}
      LIVE_PRICE_REFRESH_LIMIT_PER_QUERY: ${LIVE_PRICE_REFRESH_LIMIT_PER_QUERY:-10}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-[]}
      MAGNIT_SHOP_CODE: ${MAGNIT_SHOP_CODE:-}
      MAGNIT_SHOP_TYPE: ${MAGNIT_SHOP_TYPE:-}
      PYATEROCHKA_STORE_ID: ${PYATEROCHKA_STORE_ID:-}
      PYATEROCHKA_CITY_ID: ${PYATEROCHKA_CITY_ID:-}
      SPAR_REGION: ${SPAR_REGION:-}
      SMART_STORE_ID: ${SMART_STORE_ID:-}
      FIX_PRICE_CITY: ${FIX_PRICE_CITY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./assistantbotmemory:/app/assistantbotmemory
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed_stores &&
             python -m app.main"

volumes:
  postgres_data:
